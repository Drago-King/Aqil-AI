<!DOCTYPE html>
<html>
<head>
  <title>Aqil AI</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: 20px auto; }
    #chat { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; }
    input { width: 80%; padding: 10px; }
    button { padding: 10px; }
  </style>
</head>
<body>
  <h2>AQIL AI Chatbot</h2>

  <div id="chat"></div>

  <input id="prompt" placeholder="Ask anything...">
  <button onclick="send()">Send</button>

  <script>
    async function send() {
      const input = document.getElementById("prompt");
      const chat = document.getElementById("chat");

      chat.innerHTML += `<p><b>You:</b> ${input.value}</p>`;

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({prompt: input.value})
      });

      const data = await res.json();

      chat.innerHTML += `<p><b>AI:</b> ${data.reply}</p>`;
      input.value = "";
    }
  </script>
</body>
</html>
